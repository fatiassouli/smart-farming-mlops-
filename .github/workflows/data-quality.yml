name: Data Quality Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'data/**'
      - 'data_quality/**'
      - 'dbt/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'data/**'
      - 'data_quality/**'
      - 'dbt/**'
  workflow_dispatch:

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandera pyyaml pandas pyarrow matplotlib
      
      - name: Run pytest tests
        run: |
          cd data_quality
          pytest tests/ -v --tb=short || true
      
      - name: Validate Data Contracts
        run: |
          cd data_quality
          python -m validators.contract_validator --all || true
      
      - name: Run full pipeline validation
        run: |
          mkdir -p reports
          cd data_quality
          python -m validators.pipeline_validator --report ../reports/pipeline_report.json || true
      
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/