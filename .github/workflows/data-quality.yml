name: Data Quality Pipeline
on:
  push:
    branches: [main, develop]
    paths:
      - 'data/**'
      - 'data_quality/**'
      - 'dbt/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'data/**'
      - 'data_quality/**'
      - 'dbt/**'
  workflow_dispatch:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandera pyyaml pandas pyarrow matplotlib

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pytest tests
        run: |
          cd data_quality
          pytest tests/ -v --tb=short

      - name: Validate Data Contracts
        run: |
          cd data_quality
          python -m validators.contract_validator --all

      - name: Run full pipeline validation
        run: |
          cd data_quality
          python -m validators.pipeline_validator --report ../reports/pipeline_report.json

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/pipeline_report.json
          if-no-files-found: warn

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('reports/pipeline_report.json', 'utf8'));
            } catch (e) {
              report = { overall_status: 'UNKNOWN', pytest: { passed: false } };
            }

            const status = report.overall_status === 'PASS' ? '✅ PASSEd' : '❌ FAILED';
            const body = `## Data Quality Pipeline - ${status}

            | Check | Status |
            |-------|--------|
            | Pytest Tests | ${report.pytest?.passed ? '✅' : '❌'} |
            | Data Contracts | ${report.overall_status === 'PASS' ? '✅' : '❌'} |

            [View detailed reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });