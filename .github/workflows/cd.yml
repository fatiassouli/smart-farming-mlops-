name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: smart-farming-api

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 : Build et push image Docker
  # ═══════════════════════════════════════════════════════
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image pushed
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
          docker images | grep smart-farming-api

  # ═══════════════════════════════════════════════════════
  # JOB 2 : Déploiement sur VPS
  # ═══════════════════════════════════════════════════════
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Déploiement sur VPS..."
            
            # Créer le dossier s'il n'existe pas
            mkdir -p /opt/smart-farming
            cd /opt/smart-farming
            
            # Pull de la nouvelle image
            docker pull ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
            
            # Arrêter l'ancien conteneur s'il existe
            docker-compose down || true
            
            # Mettre à jour le docker-compose.yml si besoin
            cat > docker-compose.yml << 'COMPOSE'
            version: '3.8'
            services:
              api:
                image: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
                ports:
                  - "8000:8000"
                environment:
                  - MLFLOW_TRACKING_URI=http://mlflow:5000
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
            COMPOSE
            
            # Lancer le service
            docker-compose up -d
            
            # Nettoyer
            docker system prune -f
            
            # Vérifier
            echo "✅ Services actifs :"
            docker ps | grep smart-farming
            
            echo "✅ Déploiement terminé avec succès !"

      - name: Health check post-deploy
        run: |
          sleep 15
          curl -f http://${{ secrets.VPS_HOST }}:8000/health || echo "⚠️ Health check failed - check manually"
        continue-on-error: true
