name: CD
on:
  push:
    branches: [main]
env:
  REGISTRY: ghcr.io
  OWNER: outighli
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/smart-farming-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/smart-farming-api:${{ github.sha }}
      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/smart-farming-app:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/smart-farming-app:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /home/ubuntu/smart-farming-mlops-
            git pull origin main
            sudo docker compose pull api app
            sudo docker compose up -d api app
            sudo docker image prune -f
            echo "✅ Déployé !"
