name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      - run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pytest tests/ -v --cov=src --cov-report=xml
          else
            echo "⚠️ Pas de tests dans tests/, skip"
            mkdir -p tests
            echo "def test_placeholder(): assert True" > tests/test_placeholder.py
            pytest tests/ -v
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        continue-on-error: true

  data-quality:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas pyyaml pytest
      - name: Run Data Quality Pipeline
        run: |
          cd data_quality
          mkdir -p reports
          python validators/pipeline_validator.py --report reports/pipeline_report.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data_quality/reports/pipeline_report.json
        continue-on-error: true

  model-test:
    runs-on: ubuntu-latest
    needs: [data-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r backend/requirements.txt
          pip install scikit-learn joblib numpy pandas
      - name: Test chargement modèles
        run: |
          cd mlops
          python model_loader.py
      - name: Test log models
        run: |
          cd mlops
          python log_models.py
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: [model-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .

  test-container:
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .
      - run: |
          docker run -d --name test-api -p 8000:8000 smart-farming-api:${{ github.sha }}
          sleep 15
      - run: curl -f http://localhost:8000/health
      - run: curl -f http://localhost:8000/metrics
      - run: |
          curl -X POST http://localhost:8000/recommend_crop \
            -H "Content-Type: application/json" \
            -d '{"N":90,"P":42,"K":43,"temperature":20.8,"humidity":82.0,"ph":6.5,"rainfall":202.9}'
      - run: docker stop test-api && docker rm test-api
