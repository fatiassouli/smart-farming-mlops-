name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 : Lint & Format
  # ═══════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check . --ignore E402,E501

      - name: Black format check
        run: black --check .

  # ═══════════════════════════════════════════════════════
  # JOB 2 : Security Scan
  # ═══════════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Bandit scan
        run: bandit -r backend/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ═══════════════════════════════════════════════════════
  # JOB 3 : Tests Unitaires
  # ═══════════════════════════════════════════════════════
  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ═══════════════════════════════════════════════════════
  # JOB 4 : Data Quality
  # ═══════════════════════════════════════════════════════
  data-quality:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyyaml

      - name: Run Data Quality Pipeline
        run: |
          cd data_quality
          python validators/pipeline_validator.py --report pipeline_report.json

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data_quality/pipeline_report.json

  # ═══════════════════════════════════════════════════════
  # JOB 5 : Dagster Pipeline
  # ═══════════════════════════════════════════════════════
  dagster-pipeline:
    runs-on: ubuntu-latest
    needs: [data-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install dagster==1.7.* dagster-webserver==1.7.* pandas pyyaml

      - name: Run Dagster Pipeline
        run: |
          cd orchestration
          dagster job execute -j full_pipeline -m orchestration.definitions

  # ═══════════════════════════════════════════════════════
  # JOB 6 : Build Docker
  # ═══════════════════════════════════════════════════════
  build-docker:
    runs-on: ubuntu-latest
    needs: [dagster-pipeline]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .

      - name: Test API container
        run: |
          docker run -d --name test-api -p 8000:8000 smart-farming-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api && docker rm test-api
