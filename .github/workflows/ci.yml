name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 : Tests Unitaires
  # ═══════════════════════════════════════════════════════
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      - run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ═══════════════════════════════════════════════════════
  # JOB 2 : Test Chargement Modèles (test_load.py existant)
  # ═══════════════════════════════════════════════════════
  model-load-test:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pytest scikit-learn joblib numpy
      - name: Test chargement modèles
        run: |
          cd mlops
          python test_load.py
      - name: Upload rapport
        uses: actions/upload-artifact@v4
        with:
          name: model-load-report
          path: mlops/test_load.py

  # ═══════════════════════════════════════════════════════
  # JOB 3 : Data Quality
  # ═══════════════════════════════════════════════════════
  data-quality:
    runs-on: ubuntu-latest
    needs: [model-load-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas pyyaml
      - run: |
          cd data_quality
          python validators/pipeline_validator.py --report pipeline_report.json
      - uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data_quality/pipeline_report.json

  # ═══════════════════════════════════════════════════════
  # JOB 4 : Dagster Pipeline
  # ═══════════════════════════════════════════════════════
  dagster-pipeline:
    runs-on: ubuntu-latest
    needs: [data-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r backend/requirements.txt
          pip install dagster==1.7.* dagster-webserver==1.7.* pandas pyyaml
      - run: |
          cd orchestration
          dagster job execute -j full_pipeline -m orchestration.definitions

  # ═══════════════════════════════════════════════════════
  # JOB 5 : Build Docker
  # ═══════════════════════════════════════════════════════
  build-docker:
    runs-on: ubuntu-latest
    needs: [dagster-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .
      - run: |
          docker run -d --name test-api -p 8000:8000 smart-farming-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api && docker rm test-api
