name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E402,E501 || true

      - name: Run data quality pipeline
        run: |
          pip install pandas pyyaml
          python data_quality/validators/pipeline_validator.py --report data_quality/ci_report.json
        continue-on-error: true

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data_quality/ci_report.json

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .
          docker images | grep smart-farming-api

      - name: Test API container
        run: |
          docker run -d --name test-api -p 8000:8000 smart-farming-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api && docker rm test-api
