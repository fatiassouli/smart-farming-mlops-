name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 : Tests et qualité du code
  # ═══════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff black bandit pytest requests pandas pyyaml dagster==1.7.*

      - name: Lint with ruff
        run: |
          ruff check . --ignore E402,E501 || true

      - name: Format check with black
        run: |
          black --check . || true

      - name: Security scan with bandit
        run: |
          bandit -r backend/ -f json -o bandit-report.json || true
          cat bandit-report.json || echo "No report"

      - name: Run data quality pipeline
        run: |
          cd data_quality
          python validators/pipeline_validator.py --report pipeline_report.json
        continue-on-error: true

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data_quality/pipeline_report.json

  # ═══════════════════════════════════════════════════════
  # JOB 2 : Build Docker API
  # ═══════════════════════════════════════════════════════
  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -f backend/Dockerfile -t smart-farming-api:${{ github.sha }} .

      - name: Test API container
        run: |
          docker run -d --name test-api -p 8000:8000 smart-farming-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api && docker rm test-api

      - name: Save Docker image
        run: |
          docker save smart-farming-api:${{ github.sha }} > smart-farming-api.tar
          gzip smart-farming-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: smart-farming-api.tar.gz
