
services:
  # ═══════════════════════════════════════════
  # API FastAPI (Personne 7)
  # ═══════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./mlruns:/app/mlruns
    depends_on:
      - mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════
  # MLflow UI (Personne 6)
  # ═══════════════════════════════════════════
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri file:///mlruns
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

    # ═══════════════════════════════════════════
  # App Flask (AgroML - Interface web)
  # ═══════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Dagster Orchestration (Personne 8 - TOI)
  # ═══════════════════════════════════════════
  dagster-webserver:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ./dataops:/app/dataops
      - ./transform:/app/transform
      - ./data_quality:/app/data_quality
      - ./mlops:/app/mlops
    command: >
      dagster-webserver
      -h 0.0.0.0
      -p 3000
      -m orchestration.definitions
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ./dataops:/app/dataops
      - ./transform:/app/transform
      - ./data_quality:/app/data_quality
      - ./mlops:/app/mlops
    command: >
      dagster-daemon run
      -m orchestration.definitions
    restart: unless-stopped

volumes:
  dagster-home:
